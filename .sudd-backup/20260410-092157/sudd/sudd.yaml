# sudd.yaml — SUDD v3.3
# Central configuration for agent tiers, dispatch, and safeguards.

# Tier definitions (model + provider + endpoint + CLI)
# For opencode/crush: provider/model is passed as "{provider}/{model}" to -m flag
# endpoint is optional — only needed if CLI doesn't resolve it from provider config
tiers:
  low:
    model: glm-5.1
    provider: zai-coding-plan
    endpoint: "https://api.z.ai/api/coding/paas/v4"
    cli: opencode
  mid:
    model: claude-sonnet-4-6
    provider: anthropic
    endpoint: ""
    cli: claude-code
  top:
    model: claude-opus-4-6
    provider: anthropic
    endpoint: ""
    cli: claude-code

# Tier+1 rule (for code-reviewer: always one tier above coder)
tier_escalation:
  low: mid
  mid: top
  top: top

# Escalation ladder (retries — per-task)
# Specifies floor tier per agent role at each retry range.
# Agents above the floor keep their default tier. Never downgrades.
escalation:
  ladder:
    0-1:
      default_floor: low
    2-3:
      default_floor: low
      squad_floor: mid
      code-reviewer_floor: mid
    4-5:
      default_floor: mid
      code-reviewer_floor: top
    6-7:
      default_floor: top
    8: stuck

# Per-agent configuration
# tier: low | mid | top | inline
# context: curated | full | [curated, full] (for agents with round-specific context)
agents:
  # Inline agents (orchestrator context, no process dispatch)
  blocker-detector:         { tier: inline }
  persona-detector:         { tier: inline }
  persona-researcher:       { tier: inline }
  context-manager:          { tier: inline }
  monitor:                  { tier: inline }
  learning-engine:          { tier: inline }
  researcher:               { tier: inline }
  antigravity:              { tier: inline }
  ux-designer:              { tier: inline }

  # Low tier (execution work — GLM-5.1 free)
  coder:                    { tier: low, context: curated }
  contract-verifier:        { tier: low, context: curated }
  wiring-checker:           { tier: low, context: curated }

  # Mid tier (judgment + review)
  qa:                       { tier: mid, context: curated }
  code-reviewer:            { tier: mid, context: [curated, full] }
  micro-persona-generator:  { tier: mid, context: full }
  micro-persona-validator:  { tier: mid, context: full }
  integration-reviewer:     { tier: mid, context: curated }
  ux-reviewer:              { tier: mid, context: curated }
  ux-tester:                { tier: mid, context: curated, cli_override: claude-code }
  peer-reviewer:            { tier: mid, context: curated }
  macro-wiring-checker:     { tier: mid, context: curated }

  # Top tier (critical decisions)
  architect:                { tier: top, context: full }
  solution-explorer:        { tier: top, context: full }
  persona-validator:        { tier: top, context: full, cli_override: claude-code }
  deep-think:               { tier: top, context: full }
  decomposer:               { tier: top, context: full }
  ux-architect:             { tier: top, context: full }
  task-discoverer:          { tier: top, context: full }

# Parallelization
# v3.2: worktree mode NOT supported with process dispatch. Sequential only.
parallelization:
  mode: sequential

# Adaptive planning (unchanged from v3.1)
adaptive_planning:
  small: 5
  medium: 12
  large: 13

# Cost mode
cost_mode: balanced

# Anti-spinning budgets
token_budget:
  per_task_max: 500000
  per_change_max: 5000000
  warning_threshold: 0.8

time_budget:
  per_task_max: 3600
  per_change_max: 28800

# Dispatch configuration
dispatch:
  # Max turns per subprocess (prevents unbounded execution)
  max_turns:
    low: 15
    mid: 25
    top: 40
  # Timeout per agent type in seconds (cross-platform: use --max-turns as primary guard on Windows)
  timeout_seconds:
    coder: 600
    code-reviewer: 300
    qa: 300
    architect: 600
    squad_agent: 180
    ux-tester: 300
    default: 300

# Browser-Use configuration (v3.2 — AI-driven persona browser testing)
# Complements Playwright: Playwright handles technical checks (console errors, accessibility, network),
# browser-use handles persona simulation (natural navigation, form filling, intuitiveness).
browser_use:
  enabled: true
  # LLM provider for browser-use agent (drives the browser via natural language)
  # Options: openrouter, zai, openai, anthropic
  provider: openrouter
  model: google/gemini-2.5-flash-preview
  endpoint: "https://openrouter.ai/api/v1"
  # Environment variable name containing the API key
  api_key_env: OPENROUTER_API_KEY
  # When to run browser-use tests
  run_on:
    per_task: true     # Step 3i — after each UI task
    gate: true         # Step 6c — full persona walkthrough at gate
  # Script path (relative to project root — use persona-browser-agent package or legacy script)
  script: persona-browser-agent/persona_browser/cli.py
  # Recording (optional — saves video of persona navigating)
  record_video: false
